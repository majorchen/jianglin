[preset.0]

name="HTML5"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="resources"
include_filter="assets_hd2d/backdrop/*.png,assets_hd2d/buildings/*.png,assets_hd2d/characters/*_walk_sheet.png,assets_hd2d/terrain/*.png,assets_hd2d/props/*.png,assets_hd2d/fonts/*.ttf,data/*.json,scenes/*.tscn,scripts/*.gd"
exclude_filter="assets_hd2d/raw/*,assets_hd2d/style/*,out/*,out_godot_test/*,Godot_v4.6.3-stable_export_templates.tpz"
export_path="export/index.html"
patches=[]
ssh_remote_deploy_enabled=false

[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include=""
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=false
